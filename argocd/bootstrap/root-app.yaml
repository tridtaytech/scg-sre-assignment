# Apply once, manually:
#   kubectl apply -n argocd -f argocd/bootstrap/root-app.yaml
#
# After this, everything under argocd/managed/ is owned by Argo CD itself
# (app-of-apps pattern). Edits to AppProject / ApplicationSet take effect
# on the next sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/<OWNER>/scg-sre-assignment.git
    targetRevision: main
    path: argocd/managed
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
