# Helm chart: ingress-nginx/ingress-nginx
#
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx --create-namespace \
#     -f infra/manual/helm/nginx-ingress.yaml

controller:
  ingressClassResource:
    name: nginx
    default: true        # Ingress resources without explicit class default to nginx

  service:
    type: LoadBalancer
    # Route through the AWS Load Balancer Controller (installed via
    # `make install-aws-lbc`). The controller watches Services with this
    # class and provisions an NLB pointing at the controller pods.
    loadBalancerClass: service.k8s.aws/nlb
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip

  config:
    use-forwarded-headers: "true"
    enable-real-ip: "true"
    proxy-real-ip-cidr: "0.0.0.0/0"

  replicaCount: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: ingress-nginx
            topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  nodeSelector:
    company: scg
    project: mandatory
    nodegroup: facilities

  metrics:
    enabled: true        # /metrics endpoint for Prometheus
    serviceMonitor:
      enabled: false     # flip to true after kube-prometheus-stack is installed

defaultBackend:
  enabled: false         # NGINX returns 404 for unmatched hosts on its own
