# Helm chart: jetstack/cert-manager
#
#   helm repo add jetstack https://charts.jetstack.io
#   helm upgrade --install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     -f infra/manual/helm/cert-manager.yaml
#
# After install, apply a ClusterIssuer (see cert-manager-clusterissuer.yaml).

# Install CRDs as part of the helm release (avoids a separate `kubectl apply`).
crds:
  enabled: true
  keep: true            # don't delete CRDs on uninstall (Certificates outlive cert-manager)

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

nodeSelector:
  company: scg
  project: mandatory
  nodegroup: facilities

webhook:
  replicaCount: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  nodeSelector:
    company: scg
    project: mandatory
    nodegroup: facilities

cainjector:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  nodeSelector:
    company: scg
    project: mandatory
    nodegroup: facilities

# /metrics endpoint
prometheus:
  enabled: true
  servicemonitor:
    enabled: false      # flip after kube-prometheus-stack is installed
