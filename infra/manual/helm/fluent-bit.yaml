# Helm chart: fluent/fluent-bit
#
#   helm repo add fluent https://fluent.github.io/helm-charts
#   helm upgrade --install fluent-bit fluent/fluent-bit \
#     --namespace logging --create-namespace \
#     -f infra/manual/helm/fluent-bit.yaml
#
# DaemonSet — runs one pod per node it tolerates / matches.
# Pinned to the facilities nodegroup so it only collects from those hosts.

# Pin to the right nodes (DaemonSet still respects this)
nodeSelector:
  company: scg
  project: mandatory
  nodegroup: facilities

tolerations: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# /metrics endpoint — flip serviceMonitor on after kube-prometheus-stack is installed
serviceMonitor:
  enabled: false

# Fluent Bit pipeline:
#   tail container logs (CRI format) → enrich with k8s metadata → ship to Loki
config:
  service: |
    [SERVICE]
        Daemon         Off
        Flush          5
        Log_Level      info
        Parsers_File   parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020
        Health_Check   On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  cri
        Read_from_Head    True
        Refresh_Interval  10
        Mem_Buf_Limit     64MB
        Skip_Long_Lines   On
        DB                /var/log/flb-tail.db

  filters: |
    [FILTER]
        Name                 kubernetes
        Match                kube.*
        Kube_URL             https://kubernetes.default.svc:443
        Merge_Log            On
        Merge_Log_Key        log_processed
        K8S-Logging.Parser   On
        K8S-Logging.Exclude  On
        Annotations          Off
        Labels               On

  outputs: |
    [OUTPUT]
        Name              loki
        Match             *
        host              loki.logging.svc.cluster.local
        port              3100
        line_format       json
        auto_kubernetes_labels on
        labels            job=fluent-bit
        tenant_id         ""
