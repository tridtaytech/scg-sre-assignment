apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-local
nameSuffix: -local

resources:
  - ../../../base/backend

images:
  - name: backend:placeholder
    newName: backend
    newTag: local

replicas:
  - name: scg-asgn-be
    count: 1

patches:
  - path: disable-analysis.yaml
    target:
      kind: Rollout
      name: scg-asgn-be
