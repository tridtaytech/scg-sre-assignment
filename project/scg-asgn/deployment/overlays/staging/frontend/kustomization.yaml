apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-staging
nameSuffix: -staging

resources:
  - ../../../base/frontend

images:
  - name: frontend:placeholder
    newName: public.ecr.aws/c5a3w2d1/frontend
    newTag: PLACEHOLDER

replicas:
  - name: scg-asgn-fe
    count: 2

patches:
  - path: ingress-host.yaml
    target:
      kind: Ingress
      name: scg-asgn
  - path: backend-url.yaml
    target:
      kind: ConfigMap
      name: scg-asgn-fe-config
