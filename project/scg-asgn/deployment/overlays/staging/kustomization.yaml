apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-staging
nameSuffix: -staging

resources:
  - ../../base
  - namespace.yaml

images:
  - name: backend:placeholder
    newName: public.ecr.aws/<ALIAS>/backend
    newTag: PLACEHOLDER  # CD overwrites via `kustomize edit set image`
  - name: frontend:placeholder
    newName: public.ecr.aws/<ALIAS>/frontend
    newTag: PLACEHOLDER

replicas:
  - name: scg-asgn-be
    count: 2
  - name: scg-asgn-fe
    count: 2

patches:
  - path: ingress-host.yaml
    target:
      kind: Ingress
      name: scg-asgn
