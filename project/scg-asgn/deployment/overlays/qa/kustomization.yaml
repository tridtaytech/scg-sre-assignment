apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-qa
nameSuffix: -qa

resources:
  - ../../base
  - namespace.yaml

images:
  - name: backend:placeholder
    newName: public.ecr.aws/<ALIAS>/backend
    newTag: PLACEHOLDER
  - name: frontend:placeholder
    newName: public.ecr.aws/<ALIAS>/frontend
    newTag: PLACEHOLDER

replicas:
  - name: scg-asgn-be
    count: 2
  - name: scg-asgn-fe
    count: 2

patches:
  - path: disable-analysis.yaml
    target:
      kind: Rollout
      name: scg-asgn-be
  - path: ingress-host.yaml
    target:
      kind: Ingress
      name: scg-asgn
