apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-prod
nameSuffix: -prod

resources:
  - ../../base
  - namespace.yaml

images:
  - name: backend:placeholder
    newName: public.ecr.aws/<ALIAS>/backend
    newTag: PLACEHOLDER  # CD overwrites via `kustomize edit set image`
  - name: frontend:placeholder
    newName: public.ecr.aws/<ALIAS>/frontend
    newTag: PLACEHOLDER

replicas:
  - name: scg-asgn-be
    count: 3
  - name: scg-asgn-fe
    count: 3

patches:
  - path: rollout-prod.yaml
    target:
      kind: Rollout
      name: scg-asgn-be
  - path: hpa-prod.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: scg-asgn-be
  - path: ingress-host.yaml
    target:
      kind: Ingress
      name: scg-asgn
