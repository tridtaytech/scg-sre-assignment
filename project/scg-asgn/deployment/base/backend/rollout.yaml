apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: scg-asgn-be
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: scg-asgn-be
  template:
    metadata:
      labels:
        app: scg-asgn-be
    spec:
      containers:
        - name: backend
          image: backend:placeholder
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: scg-asgn-be-config
                  key: APP_VERSION
            - name: ROLLOUT_COLOR
              valueFrom:
                configMapKeyRef:
                  name: scg-asgn-be-config
                  key: ROLLOUT_COLOR
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  strategy:
    blueGreen:
      activeService: scg-asgn-be-active
      previewService: scg-asgn-be-preview
      autoPromotionEnabled: true
      autoPromotionSeconds: 300
      scaleDownDelaySeconds: 600
      prePromotionAnalysis:
        templates:
          - templateName: scg-asgn-be-success-rate
        args:
          - name: service-name
            value: scg-asgn-be-preview
      postPromotionAnalysis:
        templates:
          - templateName: scg-asgn-be-success-rate
        args:
          - name: service-name
            value: scg-asgn-be-active
