apiVersion: apps/v1
kind: Deployment
metadata:
  name: scg-asgn-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scg-asgn-fe
  template:
    metadata:
      labels:
        app: scg-asgn-fe
    spec:
      containers:
        - name: frontend
          image: frontend:placeholder
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "/api"
            - name: NEXT_PUBLIC_APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: scg-asgn-fe-config
                  key: NEXT_PUBLIC_APP_VERSION
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: scg-asgn-fe-config
                  key: BACKEND_URL
            - name: ROLLOUT_COLOR
              valueFrom:
                configMapKeyRef:
                  name: scg-asgn-fe-config
                  key: ROLLOUT_COLOR
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
